services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: tfbs
      POSTGRES_PASSWORD: tfbs
      POSTGRES_DB: tfbs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
